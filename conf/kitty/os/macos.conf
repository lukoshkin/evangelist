# macOS: map Command-based shortcuts used by evangelist to Meta/Alt sequences.
listen_on unix:/tmp/kitty

map cmd+h send_text normal,application \x1bh
map cmd+j send_text normal,application \x1bj
map cmd+k send_text normal,application \x1bk
map cmd+l send_text normal,application \x1bl
map cmd+m send_text normal,application \x1bm
map cmd+n send_text normal,application \x1bn
map shift+cmd+n send_text normal,application \x1bN
map cmd+p send_text normal,application \x1bp
map shift+cmd+p send_text normal,application \x1bP
map cmd+r send_text normal,application \x1br
map cmd+s send_text normal,application \x1bs
map cmd+t send_text normal,application \x1bt
map cmd+w send_text normal,application \x1bw
map cmd+enter send_text normal,application \x1b\x0d
map cmd+[ send_text normal,application \x1b[
map cmd+] send_text normal,application \x1b]
map cmd+' send_text normal,application \x1b'
map cmd+plus send_text normal,application \x1b+
map shift+cmd+equal send_text normal,application \x1b+
map cmd+minus send_text normal,application \x1b-
