# Font Configuration
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12.0

# Cursor
cursor_shape block
cursor_blink_interval 0

# Scrollback
scrollback_lines 10000

# Mouse
mouse_hide_wait 3.0

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Window layout
remember_window_size  yes
initial_window_width  640
initial_window_height 400
enabled_layouts splits

# Keyboard shortcuts
map shift+enter send_text all \x0a
map ctrl+shift+t launch --cwd=current --type=tab
map ctrl+b>v launch --cwd=current --location=vsplit
map ctrl+b>s launch --cwd=current --location=hsplit
globinclude os/${KITTY_OS}.conf

# Seamless navigation between kitty windows and neovim splits (smart-splits.nvim)
map ctrl+w>ctrl+j neighboring_window down
map ctrl+w>ctrl+k neighboring_window up
map ctrl+w>ctrl+h neighboring_window left
map ctrl+w>ctrl+l neighboring_window right

# When neovim is focused, pass ctrl+w sequences through to neovim
map --when-focus-on var:IS_NVIM ctrl+w>ctrl+j
map --when-focus-on var:IS_NVIM ctrl+w>ctrl+k
map --when-focus-on var:IS_NVIM ctrl+w>ctrl+h
map --when-focus-on var:IS_NVIM ctrl+w>ctrl+l

# Tab bar
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted

# Catppuccin-Frappe Theme
# Based on https://github.com/catppuccin/kitty

# The basic colors
foreground              #C6D0F5
background              #303446
selection_foreground    #303446
selection_background    #F2D5CF

# Cursor colors
cursor                  #F2D5CF
cursor_text_color       #303446

# URL underline color when hovering with mouse
url_color               #F2D5CF

# Kitty window border colors
active_border_color     #BABBF1
inactive_border_color   #737994
bell_border_color       #E5C890

# Tab bar colors
active_tab_foreground   #232634
active_tab_background   #CA9EE6
inactive_tab_foreground #C6D0F5
inactive_tab_background #292C3C
tab_bar_background      #232634

# Colors for marks (marked text in the terminal)
mark1_foreground #303446
mark1_background #BABBF1
mark2_foreground #303446
mark2_background #CA9EE6
mark3_foreground #303446
mark3_background #85C1DC

# The 16 terminal colors

# black
color0 #51576D
color8 #626880

# red
color1 #E78284
color9 #E78284

# green
color2  #A6D189
color10 #A6D189

# yellow
color3  #E5C890
color11 #E5C890

# blue
color4  #8CAAEE
color12 #8CAAEE

# magenta
color5  #F4B8E4
color13 #F4B8E4

# cyan
color6  #81C8BE
color14 #81C8BE

# white
color7  #B5BFE2
color15 #A5ADCE

## Required for nvim-kitty.desktop and smart-splits.nvim navigation
allow_remote_control yes
